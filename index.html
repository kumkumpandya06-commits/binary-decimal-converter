<!DOCTYPE html>
<html>
<head>
    <title>Number Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Binary ↔️ Decimal Converter</h2>

        <!-- Binary to Decimal -->
        <input type="text" id="binary" placeholder="Enter Binary">
        <button onclick="binaryToDecimal()">Convert to Decimal</button>

        <!-- Decimal to Binary -->
        <input type="text" id="decimal" placeholder="Enter Decimal">
        <button onclick="decimalToBinary()">Convert to Binary</button>

        <h3 id="result"></h3>
    </div>

    <script src="script.js"></script>

</body>
</html>
